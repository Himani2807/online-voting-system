<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vote Status</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #d1c4e9, #f8bbd0);
            text-align: center;
            padding-top: 80px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h2 {
            color: #4a148c;
        }

        .slogan {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #1565c0;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 18px;
            background: #6a1b9a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2 th:text="${message}"></h2>

    <div class="slogan" th:if="${candidateId == 1}">
        🇮🇳 "Sabka Saath, Sabka Vikas" (BJP)
    </div>

    <div class="slogan" th:if="${candidateId == 2}">
        🧹 "Kaam ki Rajneeti" (AAP)
    </div>

    <div class="slogan" th:if="${candidateId == 3}">
        ✋ "Congress ka Haath Aam Aadmi ke Saath" (Congress)
    </div>

    <div class="slogan" th:if="${candidateId == 4}">
        🌄 "Development for Northeast" (NPP)
    </div>

    <a href="/results" class="btn">📊 View Results</a>
</div>

</body>
</html>
